      html,

      .app-loader {
        position: fixed;

        flex-direction: column;
        justify-content: center;

      .loader-pattern {
        position: absolute;
        inset: 0;

        background-image: radial-gradient(#fff 1px, transparent 1px);
        background-size: 30px 30px;
      }

      .loader-icon {
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        animation: float 3s ease-in-out infinite;
      }

      .loader-title {
        margin-top: 28px;
        font-family: "Amiri", serif;
        color: #fff;
        font-size: 34px;
        font-weight: bold;
      }

      .loader-sub {
        margin-top: 10px;
        color: #d1fae5;
        font-size: 15px;
      }

      .loader-spinner {
        margin-top: 35px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.15);
        border-top-color: #ffd700;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      app-root:not(:empty) + .app-loader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
